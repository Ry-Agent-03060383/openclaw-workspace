server:
  port: 8080
  
spring:
  datasource:
    url: jdbc:h2:mem:wisdom_finance;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

jwt:
  secret: wisdom-finance-secret-key-2024
  expiration: 86400000

ai:
  openai:
    api-key: 
    base-url: https://api.openai.com
    model: gpt-4

logging:
  level:
    com.wisdom: debug
