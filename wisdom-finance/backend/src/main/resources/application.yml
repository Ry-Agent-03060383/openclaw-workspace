server:
  port: 8080
  
spring:
  application:
    name: wisdom-finance
  datasource:
    url: jdbc:mysql://localhost:3306/wisdom_finance?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0

jwt:
  secret: ${JWT_SECRET:wisdom-finance-secret-key-2024}
  expiration: 86400000
  
ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com
    model: gpt-4

logging:
  level:
    com.wisdom: debug